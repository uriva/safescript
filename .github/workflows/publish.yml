name: Publish
on:
  push:
    branches:
      - main
    paths:
      - 'deno.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish --allow-slow-types
